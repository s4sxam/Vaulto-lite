name: Build Debug APK

# Runs on every push to main, and can also be triggered manually
# from the "Actions" tab in GitHub ("Run workflow" button).
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write   # needed so the workflow can publish a Release with the APK

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaulto-lite-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish APK to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Vaulto Lite - Build #${{ github.run_number }}"
          body: |
            Automated debug build from commit ${{ github.sha }}.
            Download `app-debug.apk` below and install it on your phone
            (you may need to allow "install from unknown sources").
          prerelease: true
          files: app/build/outputs/apk/debug/*.apk